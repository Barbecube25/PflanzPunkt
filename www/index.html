const MS_PER_DAY = 86400000;

function toggleCategory(cat) {
    state.collapsedCategories[cat] = !state.collapsedCategories[cat];
    renderApp();
}

function toggleFavorite(id) {
    state.favorites = state.favorites.includes(id) ? state.favorites.filter(f => f !== id) : [...state.favorites, id];
    renderApp();
}

function simulateNextDay() {
    const nextDate = new Date(state.currentDate);
    nextDate.setDate(nextDate.getDate() + 1);
    state.currentDate = nextDate;
    let temp, condition;
    if (state.forecast && state.forecast.length > 0) {
        const day = state.forecast.shift();
        temp = day.temp;
        condition = wmoToCondition(day.weatherCode);
    } else {
        temp = Math.random() * (22 - 6) + 6;
        condition = Math.random() > 0.7 ? 'Regen' : 'Sonne';
    }
    state.weather = { condition, temp };
    const month = nextDate.getMonth();
    const factor = month === 0 ? 0.5 : (month === 1 ? 0.75 : 1.0);
    if (temp > 0) state.gts += temp * factor;
    generateTasks();
    renderApp();
}

function resetSimulation() {
    if (state.realData) {
        state.currentDate = new Date(state.realData.date);
        state.gts = state.realData.gts;
        state.weather = { ...state.realData.weather };
        state.forecast = state.realData.forecast ? [...state.realData.forecast] : [];
    }
    generateTasks();
    renderApp();
}

function handleAddToGarden(locationOption) {
    const dateInput = document.getElementById('planting-date');
    let selectedDate = new Date(state.currentDate);
    if (dateInput && dateInput.value) {
        selectedDate = new Date(dateInput.value);
        selectedDate.setHours(12, 0, 0, 0); 
    }
    const p = state.selectedPlant;
    state.myGarden.push({
        id: Math.random().toString(36).substr(2, 9),
        plantId: p.id, name: p.name, icon: p.icon, location: locationOption, 
        addedDate: selectedDate.toISOString(), lastWatered: state.currentDate.toISOString(), 
        lastFertilized: selectedDate.toISOString(), perennial: p.perennial || false,
        taskHistory: [{ type: 'planted', label: 'Eingepflanzt', icon: '🌱', date: selectedDate.toISOString() }]
    });
    state.showPlantingOptions = false;
    state.selectedPlant = null;
    state.activeTab = 'aufgaben';
    generateTasks();
    renderApp();
}

function completeTask(taskId, type, plantInstanceId) {
    state.myGarden = state.myGarden.map(p => {
        if (p.id !== plantInstanceId) return p;
        const history = p.taskHistory || [];
        if (type === 'water') return { ...p, lastWatered: state.currentDate.toISOString(), taskHistory: [...history, { type: 'water', label: 'Gegossen', icon: '💧', date: state.currentDate.toISOString() }] };
        if (type === 'fertilize') return { ...p, lastFertilized: state.currentDate.toISOString(), taskHistory: [...history, { type: 'fertilize', label: 'Gedüngt', icon: '🧪', date: state.currentDate.toISOString() }] };
        if (type === 'transplant') return { ...p, location: 'draussen', taskHistory: [...history, { type: 'transplant', label: 'Ins Freiland gepflanzt', icon: '🌱', date: state.currentDate.toISOString() }] };
        if (type === 'frost') return { ...p, taskHistory: [...history, { type: 'frost', label: 'Frostschutz angebracht', icon: '❄️', date: state.currentDate.toISOString() }] };
        return { ...p, taskHistory: [...history, { type: 'harvest', label: 'Geerntet', icon: '🧺', date: state.currentDate.toISOString() }] };
    });
    generateTasks();
    renderApp();
}

function removeFromGarden(id) {
    state.myGarden = state.myGarden.filter(p => p.id !== id);
    generateTasks();
    renderApp();
}

function openGardenItemModal(id) {
    state.selectedGardenItem = id;
    state.selectedPlant = null;

function generateTasks() {
    const tasks = [];
    const isRaining = ['Regen', 'Schnee', 'Gewitter'].includes(state.weather.condition);
    const isFrosty = state.weather.temp <= 3;
    state.myGarden.forEach(item => {
        const plantDef = gardenPlants.find(p => p.id === item.plantId);
        if(!plantDef) return;
        const daysSinceAdded = Math.floor((state.currentDate - new Date(item.addedDate)) / 86400000);
        const daysSinceWatered = Math.floor((state.currentDate - new Date(item.lastWatered)) / 86400000);

        if (item.location === 'drinnen' && daysSinceWatered >= 2) {
            tasks.push({ id: `w-${item.id}`, type: 'water', plantId: item.id, icon: 'droplet', title: `${item.name} gießen`, desc: 'Boden prüfen.', urgency: 'mittel', color: 'bg-blue-100', iconColor: 'text-blue-500' });
        }
        if (item.location === 'draussen' && daysSinceWatered >= 3 && !isRaining) {
            tasks.push({ id: `w-${item.id}`, type: 'water', plantId: item.id, icon: 'droplet', title: `${item.name} gießen`, desc: 'Kein Regen – Boden prüfen und gießen.', urgency: 'mittel', color: 'bg-blue-100', iconColor: 'text-blue-500' });
        }
        if (item.location === 'drinnen' && !plantDef.indoorOnly && plantDef.minGts && plantDef.maxGts && state.gts >= plantDef.minGts && state.gts <= plantDef.maxGts && !isRaining && !isFrosty) {
            tasks.push({ id: `out-${item.id}`, type: 'transplant', plantId: item.id, icon: 'sprout', title: `${item.name} ins Freiland pflanzen`, desc: `Jetzt guter Zeitpunkt – GTS ${state.gts.toFixed(0)}°C (ab ${plantDef.minGts}°C). Wetter passt!`, urgency: 'mittel', color: 'bg-lime-100', iconColor: 'text-lime-600' });
        }
        if (item.location === 'draussen' && plantDef.frostSensitive && isFrosty) {
            tasks.push({ id: `frost-${item.id}`, type: 'frost', plantId: item.id, icon: 'snowflake', title: `${item.name} vor Frost schützen`, desc: `Temperatur: ${state.weather.temp.toFixed(1)}°C – Frostschutz empfohlen!`, urgency: 'hoch', color: 'bg-sky-100', iconColor: 'text-sky-600' });
        }
        if (plantDef.heavyFeeder && Math.floor((state.currentDate - new Date(item.lastFertilized))/86400000) >= 28) {
            tasks.push({ id: `fert-${item.id}`, type: 'fertilize', plantId: item.id, icon: 'flask-conical', title: `${item.name} düngen`, desc: 'Braucht Nährstoffe.', urgency: 'mittel', color: 'bg-emerald-100', iconColor: 'text-emerald-600' });
        }
        if (daysSinceAdded >= (plantDef.harvestDays || 60)) {
            tasks.push({ id: `h-${item.id}`, type: 'harvest', plantId: item.id, icon: 'shopping-basket', title: `${item.name} ernten`, desc: 'Zeitreif!', urgency: 'hoch', color: 'bg-purple-100', iconColor: 'text-purple-500' });
        }
    });
    state.tasks = tasks;
}

function getTaskIconEmoji(icon) {
    const map = { 'droplet': '💧', 'flask-conical': '🧪', 'sprout': '🌱', 'snowflake': '❄️', 'shopping-basket': '🧺' };
    return map[icon] || '🧺';
}

function wmoToCondition(code) {
    if (code <= 1) return 'Sonne';
    if (code <= 3) return 'Wolken';
    if (code === 45 || code === 48) return 'Nebel';
    if (code >= 51 && code <= 67) return 'Regen';
    if (code >= 71 && code <= 77) return 'Schnee';
    if (code >= 80 && code <= 82) return 'Regen';
    if (code === 85 || code === 86) return 'Schnee';
    if (code >= 95) return 'Gewitter';
    return 'Wolken';
}

async function fetchWeather() {
    state.isLoadingWeather = true; renderHeader();
    try {
        const lat = state.latitude; const lon = state.longitude; const today = new Date();
        const startStr = `${today.getFullYear()}-01-01`; const todayStr = today.toISOString().split('T')[0];
        const futureDate = new Date(today); futureDate.setDate(futureDate.getDate() + 7);
        const futureStr = futureDate.toISOString().split('T')[0];
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_mean,weather_code&current=temperature_2m,weather_code&timezone=Europe%2FBerlin&start_date=${startStr}&end_date=${futureStr}`);
        const data = await res.json();
        let rGts = 0; const tmps = data.daily.temperature_2m_mean;
        const todayIdx = data.daily.time.indexOf(todayStr);
        const histEnd = todayIdx >= 0 ? todayIdx : Math.max(0, tmps.length - 8); // 8 = today + 7 forecast days
        for (let i = 0; i <= histEnd; i++) {
            if (tmps[i] > 0) {
                const d = new Date(data.daily.time[i]);
                rGts += tmps[i] * (d.getMonth() === 0 ? 0.5 : (d.getMonth() === 1 ? 0.75 : 1.0));
            }
        }
        const currentTemp = data.current ? data.current.temperature_2m : tmps[histEnd];
        const codes = data.daily.weather_code;
        const currentCode = data.current ? data.current.weather_code : (codes && codes.length ? codes[histEnd] : 0);
        const forecast = [];
        for (let i = histEnd + 1; i < data.daily.time.length; i++) {
            forecast.push({ date: data.daily.time[i], temp: tmps[i], weatherCode: codes[i] });
        }
        state.gts = rGts; state.weather = { condition: wmoToCondition(currentCode), temp: currentTemp };
        state.currentDate = today; state.forecast = forecast;
        state.realData = { gts: rGts, weather: state.weather, date: today, forecast: [...forecast] };
    } catch (e) { state.gts = 175; state.weather = { condition: 'Wolken', temp: 10 }; state.forecast = []; }
    state.isLoadingWeather = false; generateTasks(); renderApp();
}

                    <div class="flex items-center gap-2 uppercase tracking-wide text-xs"><i data-lucide="cloud" class="w-4 h-4"></i> Bald möglich (${upcoming.length})</div>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i></h4>
                <div class="space-y-3 ${col?'hidden':''}">` + upcoming.map(p => `<div onclick="openPlantModal('${p.id}')" class="bg-white rounded-xl p-3 border border-stone-100 flex items-center gap-3 cursor-pointer opacity-80"><div class="text-2xl w-8 text-center grayscale opacity-50">${p.icon}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-600 truncate">${p.name}</h4><div class="w-full bg-stone-100 h-1 rounded-full mt-1"><div class="bg-sky-400 h-1 rounded-full" style="width:${Math.min(100, (state.gts/p.minGts)*100)}%"></div></div></div></div>`).join('') + `</div></div>`;
        }

        if (missed.length > 0) {
            const col = state.collapsedCategories['missed'] !== false;
            html += `<div class="mb-6">
                <h4 onclick="toggleCategory('missed')" class="text-sm font-bold text-stone-500 mb-3 flex items-center justify-between cursor-pointer border-b border-stone-200 pb-1 transition-all">
                    <div class="flex items-center gap-2 uppercase tracking-wide text-xs"><i data-lucide="clock" class="w-4 h-4"></i> Saison vorbei (${missed.length})</div>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i></h4>
                <div class="space-y-2 ${col?'hidden':''}">` + missed.map(p => `<div onclick="openPlantModal('${p.id}')" class="bg-stone-100 rounded-lg p-2 flex items-center gap-3 cursor-pointer"><div class="text-lg grayscale opacity-50">${p.icon}</div><div class="text-sm font-medium text-stone-400 line-through">${p.name}</div></div>`).join('') + `</div></div>`;
        }
        html += `</div>`;
    } else if (state.activeTab === 'katalog') {
        const fil = gardenPlants.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase()));
        const grp = fil.reduce((acc, p) => { const fl = p.name[0].toUpperCase(); if (!acc[fl]) acc[fl] = []; acc[fl].push(p); return acc; }, {});
        html += `<div class="p-4 sticky top-0 bg-stone-50 z-10"><div class="relative"><i data-lucide="search" class="absolute left-3 top-2.5 text-stone-400 w-4 h-4"></i><input type="text" placeholder="Pflanze suchen..." onkeyup="state.searchQuery=this.value; renderApp();" value="${state.searchQuery}" class="w-full bg-white border border-stone-200 rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm"/></div></div><div class="p-4 pt-0">`;
        Object.keys(grp).sort().forEach(l => { html += `<div class="mb-6"><h4 class="sticky top-[72px] bg-stone-50/90 backdrop-blur font-bold text-emerald-700 border-b border-stone-200 mb-2 text-lg">${l}</h4><div class="space-y-2">` + grp[l].map(p => getPlantCardHTML(p)).join('') + `</div></div>`; });
        html += `</div>`;
    } else if (state.activeTab === 'aufgaben') {
        html += `<div class="p-4 h-full"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Zu tun</h3>`;
        if (state.tasks.length === 0) html += `<div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-6 text-center shadow-sm"><div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-emerald-500 mx-auto mb-3"><i data-lucide="check-circle"></i></div><h4 class="font-bold text-emerald-800">Alles bestens!</h4></div>`;
        else html += `<div class="space-y-3 mb-8">` + state.tasks.map(t => `<div class="bg-white rounded-xl p-3 shadow-sm border flex items-center gap-3 ${t.urgency==='hoch'?'border-amber-300':'border-stone-100'}"><div class="w-10 h-10 rounded-full flex items-center justify-center text-xl shrink-0 ${t.color} ${t.iconColor}">${getTaskIconEmoji(t.icon)}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-800 truncate">${t.title}</h4><p class="text-xs truncate text-stone-500">${t.desc}</p></div><button onclick="completeTask('${t.id}', '${t.type}', '${t.plantId}')" class="shrink-0 bg-stone-100 text-stone-600 text-xs font-bold px-3 py-2 rounded-lg"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i></button></div>`).join('') + `</div>`;
        html += `<h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Mein Garten (${state.myGarden.length})</h3>`;
        if (state.myGarden.length === 0) html += `<div class="text-center py-6 text-stone-400 text-sm">Noch keine Pflanzen im Garten.</div>`;
        else html += `<div class="space-y-3">` + state.myGarden.map(item => `<div onclick="openGardenItemModal('${item.id}')" onkeydown="if(event.key==='Enter'||event.key===' ')openGardenItemModal('${item.id}')" tabindex="0" role="button" class="bg-white rounded-xl p-3 shadow-sm border border-stone-100 flex items-center gap-3 cursor-pointer active:bg-stone-50"><div class="text-2xl w-8 text-center shrink-0">${item.icon}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-800 truncate flex items-center gap-1.5">${item.name} ${item.perennial?'<span class="text-purple-500 text-[10px]">∞</span>':''}</h4><div class="flex items-center gap-2 text-xs text-stone-500 mt-0.5"><span class="flex items-center gap-1 text-amber-600">${item.location==='drinnen'?'🏠 Haus':'☀️ Beet'}</span><span>• Tag ${Math.floor((state.currentDate-new Date(item.addedDate))/MS_PER_DAY)}</span></div></div><div class="flex items-center gap-1 shrink-0"><button onclick="event.stopPropagation(); removeFromGarden('${item.id}')" class="p-2 text-stone-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button><i data-lucide="chevron-right" class="w-4 h-4 text-stone-300"></i></div></div>`).join('') + `</div>`;
        html += `</div>`;
    } else if (state.activeTab === 'favoriten') {
        const favs = gardenPlants.filter(p => state.favorites.includes(p.id));
        html += `<div class="p-4"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Favoriten</h3>`;
        if(favs.length===0) html += `<div class="text-center py-16 text-stone-400"><i data-lucide="heart" class="w-12 h-12 mx-auto mb-3 opacity-20"></i><p>Keine Favoriten gemerkt.</p></div>`;
        else html += `<div class="space-y-3">` + favs.map(p => getPlantCardHTML(p)).join('') + `</div>`;
        html += `</div>`;
    } else if (state.activeTab === 'lexikon') {
        html += `<div class="p-4 hide-scrollbar"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Gartenwissen</h3><div class="space-y-4">` + glossaryTerms.map(t => `<div class="bg-white rounded-xl p-4 shadow-sm border border-stone-100"><h4 class="font-bold text-emerald-800 mb-1">${t.term}</h4><p class="text-stone-600 text-sm">${t.explanation}</p></div>`).join('') + `</div></div>`;
    }
    container.innerHTML = html;
    lucide.createIcons();
}

function renderFooter() {
    document.getElementById('footer-container').innerHTML = `<div class="flex gap-2"><button onclick="resetSimulation()" class="px-4 py-2.5 bg-stone-100 text-stone-700 rounded-xl font-semibold text-sm">Reset</button><button onclick="simulateNextDay()" class="flex-1 bg-emerald-600 text-white rounded-xl font-semibold text-sm py-2.5 flex items-center justify-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> +1 Tag (Vorschau)</button></div>`;
}

function openPlantModal(id) {
    state.selectedPlant = gardenPlants.find(p => p.id === id);
    state.showPlantingOptions = false;
    renderApp();
}

function closeModal() {
    state.selectedPlant = null;
    state.showPlantingOptions = false;
    renderApp();
}

function renderModal() {
    const container = document.getElementById('modal-container');

    if (state.selectedGardenItem) {
        const item = state.myGarden.find(p => p.id === state.selectedGardenItem);
        if (!item) { container.innerHTML = ''; state.selectedGardenItem = null; return; }
        const plantDef = gardenPlants.find(p => p.id === item.plantId);
        const daysSinceAdded = Math.floor((state.currentDate - new Date(item.addedDate)) / MS_PER_DAY);

        // Active tasks for this plant
        const activeTasks = state.tasks.filter(t => t.plantId === item.id);
        const activeHTML = activeTasks.length === 0 ? '' :
            `<div class="mb-4"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-2">Heute fällig</h3>` +
            activeTasks.map(t => `<div class="flex items-center gap-3 bg-amber-50 rounded-xl p-3 mb-2 border border-amber-100">
                <div class="text-xl w-8 text-center">${getTaskIconEmoji(t.icon)}</div>
                <div class="flex-1"><p class="font-semibold text-stone-700 text-sm">${t.title}</p></div>
                <button onclick="completeTask('${t.id}','${t.type}','${t.plantId}')" class="shrink-0 bg-emerald-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg">Erledigt</button>
            </div>`).join('') + `</div>`;

        // Upcoming tasks
        const upcoming = [];
        if (item.location === 'drinnen') {
            const daysUntil = Math.ceil((new Date(item.lastWatered).getTime() + 2*MS_PER_DAY - state.currentDate) / MS_PER_DAY);
            if (daysUntil > 0) upcoming.push({ icon: '💧', label: 'Gießen', daysUntil });
        }
        if (plantDef && plantDef.heavyFeeder) {
            const daysUntil = Math.ceil((new Date(item.lastFertilized).getTime() + 28*MS_PER_DAY - state.currentDate) / MS_PER_DAY);
            if (daysUntil > 0) upcoming.push({ icon: '🧪', label: 'Düngen', daysUntil });
        }
        const harvestDays = (plantDef && plantDef.harvestDays) || 60;
        const daysUntilHarvest = Math.ceil((new Date(item.addedDate).getTime() + harvestDays*MS_PER_DAY - state.currentDate) / MS_PER_DAY);
        if (daysUntilHarvest > 0) upcoming.push({ icon: '🧺', label: 'Ernten', daysUntil: daysUntilHarvest });
        upcoming.sort((a, b) => a.daysUntil - b.daysUntil);

        const upcomingHTML = upcoming.length === 0
            ? `<p class="text-sm text-stone-400 py-2 text-center">Keine anstehenden Aufgaben.</p>`
            : upcoming.map(u => `<div class="flex items-center gap-3 bg-stone-50 rounded-xl p-3 mb-2 border border-stone-100">
                <div class="text-xl w-8 text-center">${u.icon}</div>
                <div class="flex-1"><p class="font-semibold text-stone-700 text-sm">${u.label}</p></div>
                <span class="text-xs font-bold text-stone-500">${u.daysUntil === 1 ? 'Morgen' : `in ${u.daysUntil} Tagen`}</span>
            </div>`).join('');

        // History
        const history = item.taskHistory || [];
        const historyHTML = history.length === 0
            ? `<p class="text-sm text-stone-400 py-2 text-center">Noch keine Aktionen aufgezeichnet.</p>`
            : [...history].reverse().map(h => {
                const d = new Date(h.date);
                const dateStr = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                return `<div class="flex items-center gap-3 py-2.5 border-b border-stone-100 last:border-0">
                    <div class="text-lg w-8 text-center">${h.icon}</div>
                    <div class="flex-1"><p class="font-semibold text-stone-700 text-sm">${h.label}</p></div>
                    <span class="text-xs text-stone-400">${dateStr}</span>
                </div>`;
            }).join('');

        container.innerHTML = `<div class="absolute inset-0 z-50 flex flex-col justify-end bg-black/40 backdrop-blur-sm" onclick="closeGardenItemModal()">
            <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar" onclick="event.stopPropagation()">
                <div class="w-12 h-1 bg-stone-200 rounded-full mx-auto mb-6"></div>
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center text-4xl shadow-sm">${item.icon}</div>
                    <div>
                        <h2 class="text-2xl font-bold text-stone-800">${item.name}${item.perennial ? ' <span class="text-purple-500 text-base">∞</span>' : ''}</h2>
                        <div class="flex items-center gap-2 text-sm text-stone-500 mt-1">
                            <span>${item.location === 'drinnen' ? '🏠 Haus' : '☀️ Beet'}</span>
                            <span>• Tag ${daysSinceAdded}</span>
                        </div>
                    </div>
                </div>
                ${activeHTML}
                <h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-2">Bald fällig</h3>
                ${upcomingHTML}
                <h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-2 mt-5">Verlauf</h3>
                <div class="bg-white rounded-xl border border-stone-100 shadow-sm px-3 py-1">${historyHTML}</div>
                <button onclick="closeGardenItemModal()" class="w-full bg-stone-100 text-stone-800 font-bold py-3 rounded-xl mt-6 transition-colors hover:bg-stone-200">Schließen</button>
            </div>
        </div>`;
        lucide.createIcons();
        return;
    }

    if (!state.selectedPlant) { container.innerHTML = ''; return; }
    const p = state.selectedPlant; const todayISO = state.currentDate.toISOString().split('T')[0];
    let act = '';
    if (!state.showPlantingOptions) {
        act = `<button onclick="state.showPlantingOptions=true; renderApp();" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl mb-6 shadow-md flex justify-center items-center gap-2"><i data-lucide="clock" class="w-5 h-5"></i> Aussaat starten</button>`;
    } else {
        const hideOutdoorButton = p.indoorOnly || p.method === 'Vorzucht drinnen';
        let indoorNote = '';
        if (p.indoorOnly) {
            indoorNote = `<p class="text-xs text-stone-400 text-center mb-3">Diese Pflanze kann dauerhaft drinnen gehalten werden.</p>`;
        } else if (p.method === 'Vorzucht drinnen') {
            indoorNote = `<p class="text-xs text-amber-600 text-center mb-3">Vorzucht zuerst – danach ins Freiland, wenn die Bedingungen passen.</p>`;
        }
        act = `<div class="bg-stone-50 p-4 rounded-xl border border-stone-200 mb-6 shadow-inner"><h4 class="font-bold text-stone-700 mb-3 text-center text-sm">Wann & Wo gepflanzt?</h4>
            <input type="date" id="planting-date" value="${todayISO}" max="${todayISO}" class="w-full p-2 mb-4 rounded border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            ${indoorNote}<div class="flex gap-2"><button onclick="handleAddToGarden('drinnen')" class="flex-1 bg-white border border-emerald-200 text-emerald-800 font-bold py-3 rounded-lg text-xs flex flex-col items-center gap-1 hover:bg-emerald-50"><i data-lucide="home" class="w-5 h-5"></i> Haus</button>
            ${!hideOutdoorButton ? `<button onclick="handleAddToGarden('draussen')" class="flex-1 bg-white border border-emerald-200 text-emerald-800 font-bold py-3 rounded-lg text-xs flex flex-col items-center gap-1 hover:bg-emerald-50"><i data-lucide="sun" class="w-5 h-5"></i> Beet</button>` : ''}</div></div>`;
    }
    
    // Logik für saubere Listen ohne überflüssige Kommata
    const getNeighborList = (list) => {
        if (!list || list.length === 0) return '';
        const names = list.map(id => gardenPlants.find(g => g.id === id)?.name).filter(Boolean);
        return names.join(', ');
    };

    const neighborsText = getNeighborList(p.goodNeighbors);
    const gn = neighborsText ? `<div class="bg-emerald-50 rounded-xl p-3 border border-emerald-100 mb-4 flex items-start gap-3"><i data-lucide="heart" class="w-4 h-4 text-emerald-600 shrink-0"></i><div><p class="text-xs text-emerald-600 font-bold">Gute Nachbarn</p><p class="text-sm text-emerald-900 leading-snug">${neighborsText}</p></div></div>` : '';
    
    const badText = getNeighborList(p.badNeighbors);
    const bn = badText ? `<div class="bg-rose-50 rounded-xl p-3 border border-rose-100 mb-4 flex items-start gap-3"><i data-lucide="alert-triangle" class="w-4 h-4 text-rose-600 shrink-0"></i><div><p class="text-xs text-rose-600 font-bold">Schlechte Nachbarn</p><p class="text-sm text-rose-900 leading-snug">${badText}</p></div></div>` : '';
    
    container.innerHTML = `<div class="absolute inset-0 z-50 flex flex-col justify-end bg-black/40 backdrop-blur-sm" onclick="closeModal()"><div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar" onclick="event.stopPropagation()">
        <div class="w-12 h-1 bg-stone-200 rounded-full mx-auto mb-6"></div><div class="flex items-start justify-between mb-6"><div class="flex items-center gap-4"><div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center text-4xl shadow-sm">${p.icon}</div>
        <div><h2 class="text-2xl font-bold text-stone-800">${p.name}</h2><div class="flex flex-wrap gap-1.5 mt-1.5">${p.perennial?'<span class="bg-purple-100 text-purple-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded flex items-center gap-1">∞ Mehrjährig</span>':''}${p.heavyFeeder?'<span class="bg-amber-100 text-amber-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded">Starkzehrer</span>':''}</div></div></div></div>
        ${act}${p.pregrow?`<div class="bg-amber-50 rounded-xl p-3 border border-amber-100 mb-4 flex items-center gap-3"><i data-lucide="home" class="w-4 h-4 text-amber-600"></i><p class="text-sm font-semibold text-amber-900 leading-snug">Vorzucht: ca. ${p.pregrow}.</p></div>`:''}
        <div class="grid grid-cols-2 gap-3 mb-4"><div class="bg-stone-50 rounded-xl p-3 border border-stone-100"><p class="text-xs text-stone-500">GTS Start</p><p class="font-bold">${p.minGts}°C</p></div><div class="bg-stone-50 rounded-xl p-3 border border-stone-100"><p class="text-xs text-stone-500">GTS Ende</p><p class="font-bold">${p.maxGts}°C</p></div></div>
        ${gn}${bn}<div class="bg-sky-50 rounded-xl p-3 border border-sky-100 mb-6 flex items-start gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-sky-600"></i><p class="text-sm font-semibold text-sky-900 leading-snug">${p.locationReq}</p></div>
        <div class="mb-6"><h3 class="font-bold text-stone-800 mb-2">Pflegetipps</h3><div class="bg-stone-50 rounded-xl p-4 text-stone-700 text-sm leading-relaxed border border-stone-100">${p.tips}</div></div>
        <button onclick="closeModal()" class="w-full bg-stone-100 text-stone-800 font-bold py-3 rounded-xl mb-8 transition-colors hover:bg-stone-200">Schließen</button></div></div>`;
    lucide.createIcons();
}

        { name: 'Berlin', lat: 52.5200, lon: 13.4050 },
        { name: 'Hamburg', lat: 53.5511, lon: 9.9937 },
        { name: 'München', lat: 48.1351, lon: 11.5820 },

        { name: 'Frankfurt', lat: 50.1109, lon: 8.6821 },

        { name: 'Düsseldorf', lat: 51.2217, lon: 6.7762 },

    ];
    const container = document.getElementById('modal-container');
    container.innerHTML = `<div class="absolute inset-0 z-50 flex flex-col justify-end bg-black/40 backdrop-blur-sm" onclick="closeLocationModal()">
        <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-stone-200 rounded-full mx-auto mb-5"></div>

            <p class="text-xs text-stone-400 mb-5">Wähle deinen Standort für die Wettervorhersage und GTS-Berechnung.</p>
            <div class="mb-5">
                <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Stadtname (Anzeige)</label>

            </div>
            <div class="grid grid-cols-2 gap-3 mb-5">
                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Breitengrad</label>
                    <input id="loc-lat" type="number" step="0.0001" value="${state.latitude}" placeholder="50.9224" class="w-full p-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Längengrad</label>
                    <input id="loc-lon" type="number" step="0.0001" value="${state.longitude}" placeholder="6.3610" class="w-full p-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>
            <button onclick="detectGPSLocation()" class="w-full flex items-center justify-center gap-2 bg-sky-50 border border-sky-200 text-sky-700 font-bold py-3 rounded-xl mb-5 text-sm active:bg-sky-100">
                <i data-lucide="navigation" class="w-4 h-4"></i> GPS-Standort ermitteln
            </button>
            <p id="loc-gps-status" class="text-xs text-center text-stone-400 -mt-3 mb-4 hidden"></p>

                <p class="text-xs font-bold text-stone-500 uppercase tracking-wider mb-3">Schnellauswahl</p>

                    ${presets.map(c => `<button data-name="${c.name}" data-lat="${c.lat}" data-lon="${c.lon}" class="loc-preset text-left px-3 py-2 rounded-xl border border-stone-200 text-sm text-stone-700 hover:bg-emerald-50 hover:border-emerald-300 active:bg-emerald-100 transition-colors">${c.name}</button>`).join('')}
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeLocationModal()" class="flex-1 bg-stone-100 text-stone-700 font-bold py-3 rounded-xl text-sm">Abbrechen</button>
                <button onclick="saveLocation()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm active:bg-emerald-700">Speichern</button>
            </div>
        </div>
    </div>`;

    container.querySelectorAll('.loc-preset').forEach(btn => {
        btn.addEventListener('click', () => selectPreset(btn.dataset.name, btn.dataset.lat, btn.dataset.lon));

}

function selectPreset(name, lat, lon) {
    document.getElementById('loc-name').value = name;
    document.getElementById('loc-lat').value = lat;
    document.getElementById('loc-lon').value = lon;
}

function detectGPSLocation() {
    const status = document.getElementById('loc-gps-status');
    if (!navigator.geolocation) {
        status.textContent = 'GPS nicht verfügbar.';
        status.classList.remove('hidden');
        return;
    }
    status.textContent = 'Standort wird ermittelt…';
    status.classList.remove('hidden');
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat = pos.coords.latitude.toFixed(4);
            const lon = pos.coords.longitude.toFixed(4);
            document.getElementById('loc-lat').value = lat;
            document.getElementById('loc-lon').value = lon;
            if (!document.getElementById('loc-name').value.trim()) {
                document.getElementById('loc-name').value = 'Mein Standort';
            }
            status.textContent = `Gefunden: ${lat}, ${lon}`;
        },
        () => {
            status.textContent = 'GPS-Zugriff verweigert oder fehlgeschlagen.';
        }
    );
}

function saveLocation() {
    const name = document.getElementById('loc-name').value.trim() || 'Mein Standort';
    const lat = parseFloat(document.getElementById('loc-lat').value);
    const lon = parseFloat(document.getElementById('loc-lon').value);
    if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        document.getElementById('loc-gps-status').textContent = 'Bitte gültige Koordinaten eingeben.';
        document.getElementById('loc-gps-status').classList.remove('hidden');
        return;
    }
    state.location = name;
    state.latitude = lat;
    state.longitude = lon;
    try {
        localStorage.setItem('pflanzpunkt_location', JSON.stringify({ name, lat, lon }));
    } catch (e) {
        const status = document.getElementById('loc-gps-status');
        status.textContent = 'Standort konnte nicht gespeichert werden (privater Modus?).';
        status.classList.remove('hidden');
    }
    document.getElementById('modal-container').innerHTML = '';
    fetchWeather();
}

function closeLocationModal() { document.getElementById('modal-container').innerHTML = ''; }


function renderApp() { renderHeader(); renderNav(); renderContent(); renderFooter(); renderModal(); }

fetchWeather();
</script>
</body>
</html>
