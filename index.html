// --- LOGIK ---
function toggleCategory(cat) {
    state.collapsedCategories[cat] = !state.collapsedCategories[cat];
    renderApp();
}

function toggleFavorite(id) {
    state.favorites = state.favorites.includes(id) ? state.favorites.filter(f => f !== id) : [...state.favorites, id];
    renderApp();
}

function simulateNextDay() {
    const nextDate = new Date(state.currentDate);
    nextDate.setDate(nextDate.getDate() + 1);
    state.currentDate = nextDate;
    const temp = Math.random() * (22 - 6) + 6;
    state.weather = { condition: Math.random() > 0.7 ? 'Regen' : 'Sonne', temp };
    const month = nextDate.getMonth();
    const factor = month === 0 ? 0.5 : (month === 1 ? 0.75 : 1.0);
    if (temp > 0) state.gts += temp * factor;
    generateTasks();
    renderApp();
}

function resetSimulation() {
    if (state.realData) {
        state.currentDate = new Date(state.realData.date);
        state.gts = state.realData.gts;
        state.weather = { ...state.realData.weather };
    }
    generateTasks();
    renderApp();
}

function handleAddToGarden(locationOption) {
    const dateInput = document.getElementById('planting-date');
    let selectedDate = new Date(state.currentDate);
    if (dateInput && dateInput.value) {
        selectedDate = new Date(dateInput.value);
        selectedDate.setHours(12, 0, 0, 0); 
    }
    const p = state.selectedPlant;
    state.myGarden.push({
        id: Math.random().toString(36).substr(2, 9),
        plantId: p.id, name: p.name, icon: p.icon, location: locationOption, 
        addedDate: selectedDate.toISOString(), lastWatered: state.currentDate.toISOString(), 
        lastFertilized: selectedDate.toISOString(), perennial: p.perennial || false
    });
    state.showPlantingOptions = false;
    state.selectedPlant = null;
    state.activeTab = 'aufgaben';
    generateTasks();
    renderApp();
}

function completeTask(taskId, type, plantInstanceId) {
    state.myGarden = state.myGarden.map(p => {
        if (p.id !== plantInstanceId) return p;
        if (type === 'water') return { ...p, lastWatered: state.currentDate.toISOString() };
        if (type === 'fertilize') return { ...p, lastFertilized: state.currentDate.toISOString() };
        return p;
    });
    generateTasks();
    renderApp();
}

function removeFromGarden(id) {
    state.myGarden = state.myGarden.filter(p => p.id !== id);
    generateTasks();
    renderApp();
}

function generateTasks() {
    const tasks = [];
    state.myGarden.forEach(item => {
        const plantDef = gardenPlants.find(p => p.id === item.plantId);
        if(!plantDef) return;
        const daysSinceAdded = Math.floor((state.currentDate - new Date(item.addedDate)) / 86400000);
        const daysSinceWatered = Math.floor((state.currentDate - new Date(item.lastWatered)) / 86400000);
        
        if (item.location === 'drinnen' && daysSinceWatered >= 2) {
            tasks.push({ id: `w-${item.id}`, type: 'water', plantId: item.id, icon: 'droplet', title: `${item.name} gießen`, desc: 'Boden prüfen.', urgency: 'mittel', color: 'bg-blue-100', iconColor: 'text-blue-500' });
        }
        if (plantDef.heavyFeeder && Math.floor((state.currentDate - new Date(item.lastFertilized))/86400000) >= 28) {
            tasks.push({ id: `fert-${item.id}`, type: 'fertilize', plantId: item.id, icon: 'flask-conical', title: `${item.name} düngen`, desc: 'Braucht Nährstoffe.', urgency: 'mittel', color: 'bg-emerald-100', iconColor: 'text-emerald-600' });
        }
        if (daysSinceAdded >= (plantDef.harvestDays || 60)) {
            tasks.push({ id: `h-${item.id}`, type: 'harvest', plantId: item.id, icon: 'shopping-basket', title: `${item.name} ernten`, desc: 'Zeitreif!', urgency: 'hoch', color: 'bg-purple-100', iconColor: 'text-purple-500' });
        }
    });
    state.tasks = tasks;
}

    state.isLoadingWeather = true; renderHeader();
    try {
        const lat = 50.9224; const lon = 6.3610; const today = new Date();
        const startStr = `${today.getFullYear()}-01-01`; const todayStr = today.toISOString().split('T')[0];
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_mean,weather_code&timezone=Europe%2FBerlin&start_date=${startStr}&end_date=${todayStr}`);
        const data = await res.json();
        let rGts = 0; const tmps = data.daily.temperature_2m_mean;
        for (let i = 0; i < tmps.length; i++) {
            if (tmps[i] > 0) {
                const d = new Date(data.daily.time[i]);
                rGts += tmps[i] * (d.getMonth() === 0 ? 0.5 : (d.getMonth() === 1 ? 0.75 : 1.0));
            }
        }
        state.gts = rGts; state.weather = { condition: 'Sonne', temp: tmps[tmps.length-1] };
        state.currentDate = today; state.realData = { gts: rGts, weather: state.weather, date: today };
    } catch (e) { state.gts = 175; state.weather = { condition: 'Wolken', temp: 10 }; }
    state.isLoadingWeather = false; generateTasks(); renderApp();
}

function renderHeader() {
    const d = state.currentDate;
    const dateStr = `${String(d.getDate()).padStart(2,'0')}. ${d.toLocaleString('de-DE', {month:'long'})}`;
    document.getElementById('header-container').innerHTML = `
        <header class="bg-emerald-600 text-white p-4 pb-4 shadow-md">
          <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold flex items-center gap-3">PflanzPunkt</h1>
            <div class="bg-emerald-700/50 px-3 py-1 rounded-full text-xs"><i data-lucide="map-pin" class="w-3 h-3 inline mr-1"></i> ${state.location}</div>
          </div>
          <div class="flex justify-between items-end bg-emerald-700/30 p-3 rounded-xl">
            <div><p class="text-emerald-100 text-xs mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${dateStr}</p>
            <h2 class="text-2xl font-extrabold tracking-tight">${state.isLoadingWeather ? '...' : state.gts.toFixed(1)} <span class="text-sm font-normal text-emerald-200">°C GTS</span></h2></div>
            <div class="text-right text-xs">
                <div class="flex items-center gap-2 px-2 py-1 rounded-lg font-bold bg-emerald-500/50 text-emerald-50">${state.weather.temp.toFixed(1)}°</div>
            </div>
          </div>
        </header>`;
}

function renderNav() {
    const tabs = [{id:'aktuell',icon:'clock',label:'Säen'},{id:'katalog',icon:'book-a',label:'Katalog'},{id:'aufgaben',icon:'list-todo',label:'Aufgaben',badge:state.tasks.length},{id:'favoriten',icon:'heart',label:'Favoriten'},{id:'lexikon',icon:'book-open',label:'Lexikon'}];
    let h = '<div class="flex bg-white border-b border-stone-200 shrink-0 overflow-x-auto hide-scrollbar">';
    tabs.forEach(t => {
        const active = state.activeTab === t.id;
        h += `<button onclick="state.activeTab='${t.id}'; renderApp();" class="flex-1 min-w-[65px] py-2.5 text-[10px] sm:text-xs font-semibold flex flex-col justify-center items-center gap-1 border-b-2 transition-colors ${active?'border-emerald-600 text-emerald-700':'border-transparent text-stone-500'}">
            <div class="relative"><i data-lucide="${t.icon}" class="w-4 h-4" ${t.id==='favoriten'&&active?'fill="currentColor"':''}></i>${t.badge>0?`<span class="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] w-3.5 h-3.5 flex items-center justify-center rounded-full font-bold">${t.badge}</span>`:''}</div><span>${t.label}</span></button>`;
    });
    document.getElementById('nav-container').innerHTML = h + '</div>';
}

function getPlantCardHTML(p) {
    const isFav = state.favorites.includes(p.id);
    return `<div onclick="openPlantModal('${p.id}')" class="bg-white rounded-xl p-3 shadow-sm border border-stone-100 flex items-center gap-3 cursor-pointer hover:border-emerald-200 transition-all">
        <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-xl shrink-0">${p.icon}</div>
        <div class="flex-1 min-w-0">
            <h4 class="font-bold text-stone-800 truncate flex items-center gap-1.5">${p.name} ${p.perennial?'<span class="text-purple-500 text-[10px]">∞</span>':''}</h4>
            <p class="text-xs text-stone-500 truncate">${p.method}</p>
        </div>
        <button onclick="event.stopPropagation(); toggleFavorite('${p.id}');" class="shrink-0 p-1"><i data-lucide="heart" class="w-5 h-5 ${isFav?'text-red-500 fill-red-500':'text-stone-300'}"></i></button>
    </div>`;
}

function renderContent() {
    const container = document.getElementById('main-content');
    let html = '';
    if (state.activeTab === 'aktuell') {
        const cGts = state.gts;
        const lastChance = gardenPlants.filter(p => cGts >= p.minGts && cGts <= p.maxGts && (p.maxGts - cGts) <= 40);
        const current = gardenPlants.filter(p => cGts >= p.minGts && cGts <= p.maxGts && (p.maxGts - cGts) > 40);
        const upcoming = gardenPlants.filter(p => cGts < p.minGts && cGts >= p.minGts - 80);
        const missed = gardenPlants.filter(p => cGts > p.maxGts);

        const grouped = current.reduce((acc, rec) => {
            const m = rec.method.toLowerCase();
            let cat = m.includes('vorzucht') ? '🏠 Drinnen vorziehen' : (m.includes('direktsaat') ? '🌱 Direktsaat (Freiland)' : (m.includes('pflanzung') ? '🧤 Pflanzen & Stecken' : '🌱 Aussaat'));
            if (!acc[cat]) acc[cat] = []; acc[cat].push(rec); return acc;
        }, {});

        html += `<div class="p-4"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Ideal bei ${state.gts.toFixed(0)}°C</h3>`;
        ['🏠 Drinnen vorziehen', '🌱 Direktsaat (Freiland)', '🧤 Pflanzen & Stecken', '🌱 Aussaat'].forEach(cat => {
            if (grouped[cat]) {
                const col = state.collapsedCategories[cat] !== false;
                html += `<div class="mb-4">
                    <h4 onclick="toggleCategory('${cat}')" class="category-header text-sm font-bold text-emerald-800 mb-2.5 flex items-center justify-between cursor-pointer border-b border-stone-200 pb-1 p-1 transition-all">
                        <div class="flex items-center gap-2">${cat} <span class="text-[10px] opacity-60">${grouped[cat].length}</span></div>
                        <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i>
                    </h4>
                    <div class="space-y-3 ${col?'hidden':''} transition-all">` + grouped[cat].map(p => getPlantCardHTML(p)).join('') + `</div></div>`;
            }
        });

        if (lastChance.length > 0) {
            const col = state.collapsedCategories['lastChance'] !== false;
            html += `<div class="mb-6 mt-8">
                <h4 onclick="toggleCategory('lastChance')" class="text-sm font-bold text-amber-600 mb-3 flex items-center justify-between cursor-pointer border-b border-amber-100 pb-1 transition-all">
                    <div class="flex items-center gap-2 uppercase tracking-wide text-xs"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Letzte Chance (${lastChance.length})</div>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i></h4>
                <div class="space-y-3 ${col?'hidden':''}">` + lastChance.map(p => getPlantCardHTML(p).replace('border-stone-100','border-amber-200 bg-amber-50/30')).join('') + `</div></div>`;
        }

        if (upcoming.length > 0) {
            const col = state.collapsedCategories['upcoming'] !== false;
            html += `<div class="mb-6">
                <h4 onclick="toggleCategory('upcoming')" class="text-sm font-bold text-sky-600 mb-3 flex items-center justify-between cursor-pointer border-b border-sky-100 pb-1 transition-all">
                    <div class="flex items-center gap-2 uppercase tracking-wide text-xs"><i data-lucide="cloud" class="w-4 h-4"></i> Bald möglich (${upcoming.length})</div>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i></h4>
                <div class="space-y-3 ${col?'hidden':''}">` + upcoming.map(p => `<div onclick="openPlantModal('${p.id}')" class="bg-white rounded-xl p-3 border border-stone-100 flex items-center gap-3 cursor-pointer opacity-80"><div class="text-2xl w-8 text-center grayscale opacity-50">${p.icon}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-600 truncate">${p.name}</h4><div class="w-full bg-stone-100 h-1 rounded-full mt-1"><div class="bg-sky-400 h-1 rounded-full" style="width:${Math.min(100, (state.gts/p.minGts)*100)}%"></div></div></div></div>`).join('') + `</div></div>`;
        }

        if (missed.length > 0) {
            const col = state.collapsedCategories['missed'] !== false;
            html += `<div class="mb-6">
                <h4 onclick="toggleCategory('missed')" class="text-sm font-bold text-stone-500 mb-3 flex items-center justify-between cursor-pointer border-b border-stone-200 pb-1 transition-all">
                    <div class="flex items-center gap-2 uppercase tracking-wide text-xs"><i data-lucide="clock" class="w-4 h-4"></i> Saison vorbei (${missed.length})</div>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${col?'':'rotate-180'}"></i></h4>
                <div class="space-y-2 ${col?'hidden':''}">` + missed.map(p => `<div onclick="openPlantModal('${p.id}')" class="bg-stone-100 rounded-lg p-2 flex items-center gap-3 cursor-pointer"><div class="text-lg grayscale opacity-50">${p.icon}</div><div class="text-sm font-medium text-stone-400 line-through">${p.name}</div></div>`).join('') + `</div></div>`;
        }
        html += `</div>`;
    } else if (state.activeTab === 'katalog') {
        const fil = gardenPlants.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase()));
        const grp = fil.reduce((acc, p) => { const fl = p.name[0].toUpperCase(); if (!acc[fl]) acc[fl] = []; acc[fl].push(p); return acc; }, {});
        html += `<div class="p-4 sticky top-0 bg-stone-50 z-10"><div class="relative"><i data-lucide="search" class="absolute left-3 top-2.5 text-stone-400 w-4 h-4"></i><input type="text" placeholder="Pflanze suchen..." onkeyup="state.searchQuery=this.value; renderApp();" value="${state.searchQuery}" class="w-full bg-white border border-stone-200 rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm"/></div></div><div class="p-4 pt-0">`;
        Object.keys(grp).sort().forEach(l => { html += `<div class="mb-6"><h4 class="sticky top-[72px] bg-stone-50/90 backdrop-blur font-bold text-emerald-700 border-b border-stone-200 mb-2 text-lg">${l}</h4><div class="space-y-2">` + grp[l].map(p => getPlantCardHTML(p)).join('') + `</div></div>`; });
        html += `</div>`;
    } else if (state.activeTab === 'aufgaben') {
        html += `<div class="p-4 h-full"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Zu tun</h3>`;
        if (state.tasks.length === 0) html += `<div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-6 text-center shadow-sm"><div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-emerald-500 mx-auto mb-3"><i data-lucide="check-circle"></i></div><h4 class="font-bold text-emerald-800">Alles bestens!</h4></div>`;
        else html += `<div class="space-y-3 mb-8">` + state.tasks.map(t => `<div class="bg-white rounded-xl p-3 shadow-sm border flex items-center gap-3 ${t.urgency==='hoch'?'border-amber-300':'border-stone-100'}"><div class="w-10 h-10 rounded-full flex items-center justify-center text-xl shrink-0 ${t.color} ${t.iconColor}">${t.icon==='droplet'?'💧':(t.icon==='flask-conical'?'🧪':'🧺')}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-800 truncate">${t.title}</h4><p class="text-xs truncate text-stone-500">${t.desc}</p></div><button onclick="completeTask('${t.id}', '${t.type}', '${t.plantId}')" class="shrink-0 bg-stone-100 text-stone-600 text-xs font-bold px-3 py-2 rounded-lg"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i></button></div>`).join('') + `</div>`;
        html += `<h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Mein Garten (${state.myGarden.length})</h3>`;
        if (state.myGarden.length === 0) html += `<div class="text-center py-6 text-stone-400 text-sm">Noch keine Pflanzen im Garten.</div>`;
        else html += `<div class="space-y-3">` + state.myGarden.map(item => `<div class="bg-white rounded-xl p-3 shadow-sm border border-stone-100 flex items-center gap-3"><div class="text-2xl w-8 text-center shrink-0">${item.icon}</div><div class="flex-1 min-w-0"><h4 class="font-bold text-stone-800 truncate flex items-center gap-1.5">${item.name} ${item.perennial?'<span class="text-purple-500 text-[10px]">∞</span>':''}</h4><div class="flex items-center gap-2 text-xs text-stone-500 mt-0.5"><span class="flex items-center gap-1 text-amber-600">${item.location==='drinnen'?'🏠 Haus':'☀️ Beet'}</span><span>• Tag ${Math.floor((state.currentDate-new Date(item.addedDate))/86400000)}</span></div></div><button onclick="removeFromGarden('${item.id}')" class="shrink-0 p-2 text-stone-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('') + `</div>`;
        html += `</div>`;
    } else if (state.activeTab === 'favoriten') {
        const favs = gardenPlants.filter(p => state.favorites.includes(p.id));
        html += `<div class="p-4"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Favoriten</h3>`;
        if(favs.length===0) html += `<div class="text-center py-16 text-stone-400"><i data-lucide="heart" class="w-12 h-12 mx-auto mb-3 opacity-20"></i><p>Keine Favoriten gemerkt.</p></div>`;
        else html += `<div class="space-y-3">` + favs.map(p => getPlantCardHTML(p)).join('') + `</div>`;
        html += `</div>`;
    } else if (state.activeTab === 'lexikon') {
        html += `<div class="p-4 hide-scrollbar"><h3 class="font-bold text-stone-400 uppercase text-xs tracking-wider mb-4 px-1">Gartenwissen</h3><div class="space-y-4">` + glossaryTerms.map(t => `<div class="bg-white rounded-xl p-4 shadow-sm border border-stone-100"><h4 class="font-bold text-emerald-800 mb-1">${t.term}</h4><p class="text-stone-600 text-sm">${t.explanation}</p></div>`).join('') + `</div></div>`;
    }
    container.innerHTML = html;
    lucide.createIcons();
}

function renderFooter() {
    document.getElementById('footer-container').innerHTML = `<div class="flex gap-2"><button onclick="resetSimulation()" class="px-4 py-2.5 bg-stone-100 text-stone-700 rounded-xl font-semibold text-sm">Reset</button><button onclick="simulateNextDay()" class="flex-1 bg-emerald-600 text-white rounded-xl font-semibold text-sm py-2.5 flex items-center justify-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> +1 Tag (Vorschau)</button></div>`;
}

function openPlantModal(id) {
    state.selectedPlant = gardenPlants.find(p => p.id === id);
    state.showPlantingOptions = false;
    renderApp();
}

function renderModal() {
    const container = document.getElementById('modal-container');
    if (!state.selectedPlant) { container.innerHTML = ''; return; }
    const p = state.selectedPlant; const todayISO = state.currentDate.toISOString().split('T')[0];
    let act = '';
    if (!state.showPlantingOptions) {
        act = `<button onclick="state.showPlantingOptions=true; renderApp();" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl mb-6 shadow-md flex justify-center items-center gap-2"><i data-lucide="clock" class="w-5 h-5"></i> Aussaat starten</button>`;
    } else {
        act = `<div class="bg-stone-50 p-4 rounded-xl border border-stone-200 mb-6 shadow-inner"><h4 class="font-bold text-stone-700 mb-3 text-center text-sm">Wann & Wo gepflanzt?</h4>
            <input type="date" id="planting-date" value="${todayISO}" max="${todayISO}" class="w-full p-2 mb-4 rounded border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <div class="flex gap-2"><button onclick="handleAddToGarden('drinnen')" class="flex-1 bg-white border border-emerald-200 text-emerald-800 font-bold py-3 rounded-lg text-xs flex flex-col items-center gap-1 hover:bg-emerald-50"><i data-lucide="home" class="w-5 h-5"></i> Haus</button>
            <button onclick="handleAddToGarden('draussen')" class="flex-1 bg-white border border-emerald-200 text-emerald-800 font-bold py-3 rounded-lg text-xs flex flex-col items-center gap-1 hover:bg-emerald-50"><i data-lucide="sun" class="w-5 h-5"></i> Beet</button></div></div>`;
    }
    
    // Logik für saubere Listen ohne überflüssige Kommata
    const getNeighborList = (list) => {
        if (!list || list.length === 0) return '';
        const names = list.map(id => gardenPlants.find(g => g.id === id)?.name).filter(Boolean);
        return names.join(', ');
    };

    const neighborsText = getNeighborList(p.goodNeighbors);
    const gn = neighborsText ? `<div class="bg-emerald-50 rounded-xl p-3 border border-emerald-100 mb-4 flex items-start gap-3"><i data-lucide="heart" class="w-4 h-4 text-emerald-600 shrink-0"></i><div><p class="text-xs text-emerald-600 font-bold">Gute Nachbarn</p><p class="text-sm text-emerald-900 leading-snug">${neighborsText}</p></div></div>` : '';
    
    const badText = getNeighborList(p.badNeighbors);
    const bn = badText ? `<div class="bg-rose-50 rounded-xl p-3 border border-rose-100 mb-4 flex items-start gap-3"><i data-lucide="alert-triangle" class="w-4 h-4 text-rose-600 shrink-0"></i><div><p class="text-xs text-rose-600 font-bold">Schlechte Nachbarn</p><p class="text-sm text-rose-900 leading-snug">${badText}</p></div></div>` : '';
    
    container.innerHTML = `<div class="absolute inset-0 z-50 flex flex-col justify-end bg-black/40 backdrop-blur-sm" onclick="closeModal()"><div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar" onclick="event.stopPropagation()">
        <div class="w-12 h-1 bg-stone-200 rounded-full mx-auto mb-6"></div><div class="flex items-start justify-between mb-6"><div class="flex items-center gap-4"><div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center text-4xl shadow-sm">${p.icon}</div>
        <div><h2 class="text-2xl font-bold text-stone-800">${p.name}</h2><div class="flex flex-wrap gap-1.5 mt-1.5">${p.perennial?'<span class="bg-purple-100 text-purple-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded flex items-center gap-1">∞ Mehrjährig</span>':''}${p.heavyFeeder?'<span class="bg-amber-100 text-amber-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded">Starkzehrer</span>':''}</div></div></div></div>
        ${act}${p.pregrow?`<div class="bg-amber-50 rounded-xl p-3 border border-amber-100 mb-4 flex items-center gap-3"><i data-lucide="home" class="w-4 h-4 text-amber-600"></i><p class="text-sm font-semibold text-amber-900 leading-snug">Vorzucht: ca. ${p.pregrow}.</p></div>`:''}
        <div class="grid grid-cols-2 gap-3 mb-4"><div class="bg-stone-50 rounded-xl p-3 border border-stone-100"><p class="text-xs text-stone-500">GTS Start</p><p class="font-bold">${p.minGts}°C</p></div><div class="bg-stone-50 rounded-xl p-3 border border-stone-100"><p class="text-xs text-stone-500">GTS Ende</p><p class="font-bold">${p.maxGts}°C</p></div></div>
        ${gn}${bn}<div class="bg-sky-50 rounded-xl p-3 border border-sky-100 mb-6 flex items-start gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-sky-600"></i><p class="text-sm font-semibold text-sky-900 leading-snug">${p.locationReq}</p></div>
        <div class="mb-6"><h3 class="font-bold text-stone-800 mb-2">Pflegetipps</h3><div class="bg-stone-50 rounded-xl p-4 text-stone-700 text-sm leading-relaxed border border-stone-100">${p.tips}</div></div>
        <button onclick="closeModal()" class="w-full bg-stone-100 text-stone-800 font-bold py-3 rounded-xl mb-4 transition-colors hover:bg-stone-200">Schließen</button></div></div>`;
    lucide.createIcons();
}

function closeModal() { state.selectedPlant = null; state.showPlantingOptions = false; renderApp(); }
function renderApp() { renderHeader(); renderNav(); renderContent(); renderFooter(); renderModal(); }

fetchWeather();
</script>
</body>
</html>
