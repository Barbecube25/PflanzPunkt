name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'build-android.sh'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools and platform
        run: |
          sdkmanager "build-tools;35.0.0" "platforms;android-35"

      - name: Build APK
        run: |
          chmod +x build-android.sh
          ./build-android.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PflanzPunkt-debug
          path: PflanzPunkt-debug.apk
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PflanzPunkt-debug.apk
          name: PflanzPunkt ${{ github.ref_name }}
